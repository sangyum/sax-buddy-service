openapi: 3.1.0
info:
  title: Sax Buddy Service API
  description: "\n        REST backend service for a multi-agent AI application for\
    \ saxophone learning.\n        This system processes structured performance data\
    \ from mobile devices to provide \n        adaptive feedback and generate personalized\
    \ lesson plans based on multi-dimensional \n        skill tracking (intonation,\
    \ rhythm, articulation, dynamics).\n        "
  version: 0.1.0
  contact:
    name: Sax Buddy Team
  license:
    name: MIT
servers:
- url: http://localhost:8000
  description: Development server
- url: https://api.saxbuddy.com
  description: Production server
paths:
  /v1/users:
    post:
      tags:
      - Users
      summary: Create User
      description: Create new user
      operationId: create_user_v1_users_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /v1/users/{user_id}:
    get:
      tags:
      - Users
      summary: Get User
      description: Get user by ID
      operationId: get_user_v1_users__user_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/users/{user_id}/profile:
    get:
      tags:
      - Users
      summary: Get User Profile
      description: Get user profile
      operationId: get_user_profile_v1_users__user_id__profile_get
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Users
      summary: Update User Profile
      description: Update user profile
      operationId: update_user_profile_v1_users__user_id__profile_put
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/users/{user_id}/progress:
    get:
      tags:
      - Users
      summary: Get User Progress
      description: Get user progress
      operationId: get_user_progress_v1_users__user_id__progress_get
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProgress'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/performance/sessions:
    post:
      tags:
      - Performance
      summary: Create Session
      description: Start new practice session
      operationId: create_session_v1_performance_sessions_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerformanceSessionCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceSession'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /v1/performance/sessions/{session_id}:
    get:
      tags:
      - Performance
      summary: Get Session
      description: Get session details
      operationId: get_session_v1_performance_sessions__session_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceSession'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - Performance
      summary: Update Session
      description: Update session (e.g., end session)
      operationId: update_session_v1_performance_sessions__session_id__patch
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerformanceSessionUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceSession'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/performance/sessions/{session_id}/metrics:
    post:
      tags:
      - Performance
      summary: Submit Metrics
      description: Submit performance metrics from mobile DSP
      operationId: submit_metrics_v1_performance_sessions__session_id__metrics_post
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/PerformanceMetricsCreate'
              title: Metrics List
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PerformanceMetrics'
                title: Response Submit Metrics V1 Performance Sessions  Session Id  Metrics
                  Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Performance
      summary: Get Session Metrics
      description: Get session metrics
      operationId: get_session_metrics_v1_performance_sessions__session_id__metrics_get
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PerformanceMetrics'
                title: Response Get Session Metrics V1 Performance Sessions  Session
                  Id  Metrics Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/performance/sessions/{session_id}/file:
    post:
      tags:
      - Performance
      summary: Upload Performance
      description: Upload performance recording
      operationId: upload_performance_v1_performance_sessions__session_id__file_post
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_performance_v1_performance_sessions__session_id__file_post'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string
                title: Response Upload Performance V1 Performance Sessions  Session
                  Id  File Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/exercises:
    get:
      tags:
      - Content
      summary: List Exercises
      description: List exercises
      operationId: list_exercises_v1_exercises_get
      security:
      - HTTPBearer: []
      parameters:
      - name: exercise_type
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/ExerciseType'
          - type: 'null'
          title: Exercise Type
      - name: difficulty_level
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/DifficultyLevel'
          - type: 'null'
          title: Difficulty Level
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Exercise'
                title: Response List Exercises V1 Exercises Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/exercises/{exercise_id}:
    get:
      tags:
      - Content
      summary: Get Exercise
      description: Get exercise details
      operationId: get_exercise_v1_exercises__exercise_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: exercise_id
        in: path
        required: true
        schema:
          type: string
          title: Exercise Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exercise'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/users/{user_id}/lesson-plans:
    get:
      tags:
      - Content
      summary: Get User Lesson Plans
      description: Get user's lesson plans
      operationId: get_user_lesson_plans_v1_users__user_id__lesson_plans_get
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      - name: is_active
        in: query
        required: false
        schema:
          type: boolean
          default: true
          title: Is Active
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LessonPlan'
                title: Response Get User Lesson Plans V1 Users  User Id  Lesson Plans
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Content
      summary: Generate Lesson Plan
      description: Generate new lesson plan for user
      operationId: generate_lesson_plan_v1_users__user_id__lesson_plans_post
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonPlan'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/lesson-plans/{plan_id}/lessons:
    get:
      tags:
      - Content
      summary: Get Lessons In Plan
      description: Get lessons in plan
      operationId: get_lessons_in_plan_v1_lesson_plans__plan_id__lessons_get
      security:
      - HTTPBearer: []
      parameters:
      - name: plan_id
        in: path
        required: true
        schema:
          type: string
          title: Plan Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Lesson'
                title: Response Get Lessons In Plan V1 Lesson Plans  Plan Id  Lessons
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/lessons/{lesson_id}:
    get:
      tags:
      - Content
      summary: Get Lesson
      description: Get lesson details
      operationId: get_lesson_v1_lessons__lesson_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: lesson_id
        in: path
        required: true
        schema:
          type: string
          title: Lesson Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lesson'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - Content
      summary: Update Lesson
      description: Update lesson completion status
      operationId: update_lesson_v1_lessons__lesson_id__patch
      security:
      - HTTPBearer: []
      parameters:
      - name: lesson_id
        in: path
        required: true
        schema:
          type: string
          title: Lesson Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LessonUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lesson'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/users/{user_id}/assessments:
    get:
      tags:
      - Assessment
      summary: Get User Assessments
      description: Get user's formal assessments
      operationId: get_user_assessments_v1_users__user_id__assessments_get
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 10
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FormalAssessment'
                title: Response Get User Assessments V1 Users  User Id  Assessments
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Assessment
      summary: Trigger Assessment
      description: Trigger formal assessment
      operationId: trigger_assessment_v1_users__user_id__assessments_post
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssessmentTrigger'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormalAssessment'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/performance/sessions/{session_id}/feedback:
    get:
      tags:
      - Assessment
      summary: Get Session Feedback
      description: Get session feedback
      operationId: get_session_feedback_v1_performance_sessions__session_id__feedback_get
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feedback'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/users/{user_id}/skill-metrics:
    get:
      tags:
      - Assessment
      summary: Get User Skill Metrics
      description: Get user's current skill metrics
      operationId: get_user_skill_metrics_v1_users__user_id__skill_metrics_get
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      - name: period_days
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 30
          title: Period Days
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillMetrics'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/reference/skill-levels:
    get:
      tags:
      - Reference
      summary: Get Skill Level Definitions
      description: Get skill level definitions
      operationId: get_skill_level_definitions_v1_reference_skill_levels_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/SkillLevelDefinition'
                type: array
                title: Response Get Skill Level Definitions V1 Reference Skill Levels
                  Get
      security:
      - HTTPBearer: []
  /v1/reference/performances:
    get:
      tags:
      - Reference
      summary: Get Reference Performances
      description: Get reference performances
      operationId: get_reference_performances_v1_reference_performances_get
      security:
      - HTTPBearer: []
      parameters:
      - name: exercise_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Exercise Id
      - name: skill_level
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/SkillLevel'
          - type: 'null'
          title: Skill Level
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReferencePerformance'
                title: Response Get Reference Performances V1 Reference Performances
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /:
    get:
      summary: Root
      description: Root endpoint
      operationId: root__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /health:
    get:
      summary: Health Check
      description: Health check endpoint
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /swagger:
    get:
      summary: Get Swagger Ui
      description: Swagger UI endpoint - redirects to the main docs
      operationId: get_swagger_ui_swagger_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    AssessmentTrigger:
      properties:
        trigger_reason:
          $ref: '#/components/schemas/TriggerReason'
      type: object
      required:
      - trigger_reason
      title: AssessmentTrigger
    AssessmentType:
      type: string
      enum:
      - periodic
      - on_demand
      - milestone
      title: AssessmentType
    Body_upload_performance_v1_performance_sessions__session_id__file_post:
      properties:
        file:
          type: string
          format: binary
          title: File
      type: object
      required:
      - file
      title: Body_upload_performance_v1_performance_sessions__session_id__file_post
    DifficultyLevel:
      type: string
      enum:
      - beginner
      - intermediate
      - advanced
      title: DifficultyLevel
    Exercise:
      properties:
        id:
          type: string
          title: Id
          description: Unique exercise identifier
        title:
          type: string
          title: Title
          description: Exercise title
        description:
          type: string
          title: Description
          description: Exercise description
        exercise_type:
          $ref: '#/components/schemas/ExerciseType'
          description: Type of exercise
        difficulty_level:
          $ref: '#/components/schemas/DifficultyLevel'
          description: Exercise difficulty
        estimated_duration_minutes:
          type: integer
          minimum: 1.0
          title: Estimated Duration Minutes
          description: Estimated time to complete
        instructions:
          items:
            type: string
          type: array
          title: Instructions
          description: Step-by-step instructions
        reference_audio_url:
          anyOf:
          - type: string
          - type: 'null'
          title: Reference Audio Url
          description: URL to reference audio file
        sheet_music_url:
          anyOf:
          - type: string
          - type: 'null'
          title: Sheet Music Url
          description: URL to sheet music
        is_active:
          type: boolean
          title: Is Active
          description: Whether exercise is available
          default: true
        created_at:
          type: string
          format: date-time
          title: Created At
          description: Exercise creation timestamp
        updated_at:
          type: string
          format: date-time
          title: Updated At
          description: Last update timestamp
      type: object
      required:
      - id
      - title
      - description
      - exercise_type
      - difficulty_level
      - estimated_duration_minutes
      title: Exercise
    ExerciseType:
      type: string
      enum:
      - scales
      - arpeggios
      - technical
      - etudes
      - songs
      - long_tone
      title: ExerciseType
    Feedback:
      properties:
        id:
          type: string
          title: Id
          description: Unique feedback identifier
        user_id:
          type: string
          title: User Id
          description: Reference to User
        session_id:
          type: string
          title: Session Id
          description: Reference to PerformanceSession
        feedback_type:
          $ref: '#/components/schemas/FeedbackType'
          description: Type of feedback
        message:
          type: string
          title: Message
          description: Main feedback message
        encouragement:
          type: string
          title: Encouragement
          description: Motivational message
          default: ''
        specific_suggestions:
          items:
            type: string
          type: array
          title: Specific Suggestions
          description: Actionable improvement suggestions
        areas_of_improvement:
          items:
            type: string
          type: array
          title: Areas Of Improvement
          description: Skills to focus on
        strengths_highlighted:
          items:
            type: string
          type: array
          title: Strengths Highlighted
          description: User's demonstrated strengths
        confidence_score:
          anyOf:
          - type: number
            maximum: 1.0
            minimum: 0.0
          - type: 'null'
          title: Confidence Score
          description: AI confidence in feedback accuracy
        created_at:
          type: string
          format: date-time
          title: Created At
          description: Feedback creation timestamp
      type: object
      required:
      - id
      - user_id
      - session_id
      - feedback_type
      - message
      title: Feedback
    FeedbackType:
      type: string
      enum:
      - post_session
      - motivational
      - corrective
      title: FeedbackType
    FormalAssessment:
      properties:
        id:
          type: string
          title: Id
          description: Unique assessment identifier
        user_id:
          type: string
          title: User Id
          description: Reference to User
        assessment_type:
          $ref: '#/components/schemas/AssessmentType'
          description: Type of assessment
        trigger_reason:
          $ref: '#/components/schemas/TriggerReason'
          description: What triggered this assessment
        skill_metrics:
          additionalProperties:
            type: number
